# Manifeste de test couvrant tous les kinds et options.
sessions:
  bossa:
    apps:
      - kind: carla
        name: clean
        preset: presets/clean.carla
        osc_tcp_port: 1455
      - kind: hydrogen
        name: bossa_groove
        song: songs/bossa.h2song
      - kind: sooperlooper
        name: looper
        osc_port: 9951
        loops: 2
        channels: 2
        looptime: 60
        session: loops/bossa.slsess
        midi_binding: midi/footswitch.slb
    patchbay:
      file: patchbays/bossa.qpwgraph
      exclusive: true
  jam:
    apps:
      - kind: carla
        name: dirty
        preset: /abs/path/dirty.carla
      - kind: sooperlooper
        name: jam_looper
        # défauts: osc_port 9951 interdit (dupliqué) → port explicite
        osc_port: 9952
    patchbay:
      file: patchbays/jam.qpwgraph
      exclusive: false
